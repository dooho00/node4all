name: cgt_env
channels:
  - nvidia
  - pytorch
  - dglteam/label/th24_cu121
  - pyg
  - conda-forge
dependencies:
  - python=3.10
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - dgl
  - pyg
  - pandas
  - cvxpy
  - matplotlib
  - pip
  - pip:
      - --find-links https://data.pyg.org/whl/torch-2.4.0+cu121.html
      - pyg_lib
      - torch_scatter
      - torch_sparse
      - torch_cluster
      - torch_spline_conv
      - "tabpfn-extensions[all] @ git+https://github.com/PriorLabs/tabpfn-extensions.git"
      - wandb
      - ogb
      - packaging
      - pygda
